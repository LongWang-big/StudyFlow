name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 8 + Maven 依赖缓存
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 3. 语法与类型检查（等价于 npm run lint）
      - name: Compile — 语法与类型检查
        run: mvn compile -q

      # 4. 运行全部测试（等价于 npm run test）
      - name: Test — 单元测试 + 集成测试
        run: mvn test

      # 5. 打包验证（确认可构建产物）
      - name: Package — 构建 JAR 产物
        run: mvn package -DskipTests -q

      # 6. 上传测试报告（无论成功失败都上传）
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
